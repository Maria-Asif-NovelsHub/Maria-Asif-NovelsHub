<!DOCTYPE html>
<html>
<head>
    <title>Maria Novels Hub</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Top Title Bar */
        .top-title {
            background-color: #003951;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 38px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* Navigation Bar */
        .navbar {
            background-color: #003951;
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 15px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
        }

        .navbar a:hover {
            color: hotpink;
        }
    </style>
</head>
<body>

    <!-- Title -->
    <div class="top-title">
         Maria Novels Hub ✨
    </div>

    <!-- Navigation Bar -->
    <div class="navbar">
        <a href="#">Home</a>
        <a href="#">Novels</a>
        <a href="#">Writers</a>
        <a href="#">Feedback</a>
        <a href="#">Contact</a>
    </div>

</body>
</html>
